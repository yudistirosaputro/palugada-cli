schema_version: "1.0"
id: kmp
title: "kmp-test"
languages: [kotlin, swift]

fact_families:
  - { id: symbol, symbol: true }

flows:
  bugfix:   [code.recent, symbol.find]
  feature:  [recipe(feature)]
  refactor: [convention(architecture)]
  review:   [diff.scan, convention(by-file-kind)]

review_map:
  symbol: [architecture]

# Build/test/lint/run verbs for `palugada exec <verb>` (override per-repo in
# .palugada/config.yaml). `lint` assumes the detekt plugin; `run` assumes the
# Gradle application plugin — override if your setup differs. Default timeout 600s.
exec:
  build: ./gradlew build
  test:  ./gradlew test
  lint:  ./gradlew detekt
  run:   ./gradlew run
