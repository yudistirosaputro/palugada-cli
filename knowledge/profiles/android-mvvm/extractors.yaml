# Declarative extraction rules for the android-mvvm profile.
# Each family declares EITHER a `regex` (run over the file text) OR a tree-sitter
# `query` (a .scm file run against the parsed tree, with a `language`). Both
# capture a `name`. Structural families (class/interface lookups) use tree-sitter
# so comments and strings can't false-match; the long tail (annotation args, XML)
# stays regex.

schema_version: "1.0"

ignore_dirs: [".git", "build", ".gradle", ".idea", "node_modules", ".palugada", "target"]

families:
  - id: viewmodel
    ext: [kt]
    language: kotlin
    query: extractors/viewmodel.scm

  - id: repository
    ext: [kt]
    language: kotlin
    query: extractors/repository.scm

  - id: service
    ext: [kt]
    language: kotlin
    query: extractors/service.scm

  - id: route
    ext: [kt]
    regex: '@Route\s*\(\s*path\s*=\s*"(?P<name>[^"]+)"'

  - id: i18n
    ext: [xml]
    path_contains: "values"
    regex: '<string\s+name="(?P<name>[^"]+)"'
