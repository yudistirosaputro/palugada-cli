# Example per-project config — copy to <your-repo>/.palugada/config.yaml
# Tokens are NOT stored here; this file only names the auth-profile (resolved
# from ~/.palugada/secrets.yaml), so it is safe to commit.

project: my-app
profile: android-mvvm
auth_profile: default

integrations:
  issue_tracker:
    provider: jira                 # implemented
    base_url: "https://your-org.atlassian.net/rest/api/2"
  wiki:
    provider: confluence           # implemented
    base_url: "https://your-org.atlassian.net/wiki/rest/api/content"
  git_host:
    provider: gitlab               # implemented (also: github)
    base_url: "https://gitlab.com"
  design:
    provider: figma                # implemented (base_url optional; defaults to api.figma.com)
  ci:
    provider: jenkins              # implemented
    base_url: "https://jenkins.example.com"
