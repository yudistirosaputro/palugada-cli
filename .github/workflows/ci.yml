name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      # Lint gate (Linux only — the code is platform-agnostic). Fails on any
      # warning so drift can't accumulate.
      - name: Clippy
        if: runner.os == 'Linux'
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --release --locked

      # Smoke test the offline knowledge layer. `q --list` reads the bundled
      # knowledge/ dir (found by walking up from the repo checkout) and needs
      # HOME set — Windows runners don't set it by default.
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./target/release/palugada --help
          ./target/release/palugada q --list --profile rust-cli

      # Every bundled profile must pass `profile validate` (render shape, flows,
      # cross-refs, on-disk docs) so a broken/empty profile can't ship again.
      - name: Validate bundled profiles (Unix)
        if: runner.os != 'Windows'
        run: |
          for p in android-mvvm flutter-bloc rust-cli; do
            echo "validating $p"
            ./target/release/palugada profile validate "$p"
          done

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        env:
          HOME: ${{ runner.temp }}
        run: |
          ./target/release/palugada.exe --help
          ./target/release/palugada.exe q --list --profile rust-cli
