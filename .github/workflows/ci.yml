name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Test
        run: cargo test --release --locked

      # Smoke test the offline knowledge layer. `q --list` reads the bundled
      # knowledge/ dir (found by walking up from the repo checkout) and needs
      # HOME set — Windows runners don't set it by default.
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./target/release/palugada --help
          ./target/release/palugada q --list

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        env:
          HOME: ${{ runner.temp }}
        run: |
          ./target/release/palugada.exe --help
          ./target/release/palugada.exe q --list
